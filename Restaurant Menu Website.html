<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Delight Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f0fdf4}
header{background:linear-gradient(135deg,#2e7d32,#66bb6a);color:#fff;padding:20px;text-align:center}
nav{text-align:center;margin:10px}
button{padding:10px 18px;margin:6px;background:#2e7d32;color:#fff;border:none;border-radius:25px;cursor:pointer}
.container{display:none}

/* HERO SECTION */
.hero{
height:80vh;
background:url('https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}
.hero-content{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:15px;
}
.hero h2{font-size:40px;margin-bottom:10px}

/* MENU */
#menu{padding:20px}
#menuList{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.menu-item{background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.menu-item img{width:100%;height:160px;object-fit:cover}
.menu-content{text-align:center;padding:10px}

/* CART */
#cart{padding:20px}
#cartItems div{background:#fff;margin:8px 0;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.qty-btn{padding:5px 10px;border-radius:50%;background:#66bb6a}
</style>
</head>
<body>

<header>
<h1>🌿 Green Delight</h1>
<p>Pure Veg | Fresh | Healthy</p>
</header>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('menu')">Menu</button>
<button onclick="showPage('cart')">Cart</button>
</nav>

<!-- HOME WITH LARGE IMAGE -->
<div id="home" class="container" style="display:block">
<div class="hero">
<div class="hero-content">
<h2>Delicious Veg Food</h2>
<p>Experience Taste Like Never Before 🍽️</p>
<button onclick="showPage('menu')">Order Now</button>
</div>
</div>
</div>

<div id="menu" class="container">
<h2 style="text-align:center">Menu</h2>
<div id="menuList"></div>
</div>

<div id="cart" class="container">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="showPayment()">Proceed Payment</button>
<div id="payment" style="display:none">
<h3>Payment</h3>
<button onclick="completePayment()">UPI</button>
<button onclick="codOrder()">COD</button>
</div>
</div>

<script>
let menu=[
{name:"Paneer Butter Masala",price:250,img:"https://images.pexels.com/photos/7625056/pexels-photo-7625056.jpeg"},
{name:"Veg Biryani",price:200,img:"https://tse3.mm.bing.net/th/id/OIP.09w0S6udb6sRvC1qeh3gdQHaE0?rs=1&pid=ImgDetMain&o=7&rm=3"},
{name:"Masala Dosa",price:120,img:"https://images.pexels.com/photos/5560763/pexels-photo-5560763.jpeg"},
{name:"Pav Bhaji",price:150,img:"https://static.vecteezy.com/system/resources/previews/004/957/509/large_2x/indian-mumbai-street-style-pav-bhaji-garnished-with-peas-raw-onions-coriander-and-butter-spicy-thick-curry-made-of-out-mixed-vegetables-served-with-pav-over-white-background-with-copy-space-photo.jpg"},
{name:"Chole Bhature",price:140,img:"https://images.pexels.com/photos/5410400/pexels-photo-5410400.jpeg"},
{name:"Veg Thali",price:220,img:"https://images.pexels.com/photos/958545/pexels-photo-958545.jpeg"},
{name:"Paneer Tikka",price:260,img:"https://tse1.mm.bing.net/th/id/OIP.uxZyx2BrmtT4eMIt88GfnAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"},
{name:"Fried Rice",price:180,img:"https://png.pngtree.com/background/20230426/original/pngtree-fried-rice-food-new-home-chef-picture-image_2484838.jpg"},
{name:"Hakka Noodles",price:170,img:"https://www.cookwithmanali.com/wp-content/uploads/2014/11/Hakka-Noodles-1.jpg"},
{name:"Dal Tadka",price:130,img:"https://static.vecteezy.com/system/resources/previews/038/972/483/non_2x/ai-generated-dal-tadka-is-a-popular-indian-dish-where-cooked-spiced-lentils-are-finished-with-a-tempering-made-of-ghee-or-oil-and-spices-photo.jpg"},
{name:"Aloo Paratha",price:90,img:"https://tse1.mm.bing.net/th/id/OIP.8DE6gB_yvLkqxVDtEHFE5QHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"},
{name:"Idli Sambhar",price:100,img:"https://th.bing.com/th/id/OIP.RgXXOpz-SIXTJZRoX2FsjQHaE8?w=297&h=198&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"},
{name:"Spring Rolls",price:160,img:"https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg"},
{name:"Veg Pizza",price:300,img:"https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg"},
{name:"Gulab Jamun",price:80,img:"https://tse3.mm.bing.net/th/id/OIP.B32bansRI7RS3yfbUSEBNwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"}
];

let cart={};

function showPage(p){
document.querySelectorAll('.container').forEach(x=>x.style.display='none');
document.getElementById(p).style.display='block';
}

function loadMenu(){
let m=document.getElementById('menuList');
m.innerHTML='';
menu.forEach((item,i)=>{
m.innerHTML+=`<div class='menu-item'>
<img src='${item.img}'>
<div class='menu-content'>
<h3>${item.name}</h3>
<p>₹${item.price}</p>
<button onclick='addToCart(${i})'>Add</button>
</div>
</div>`;
});
}

function addToCart(i){
let name=menu[i].name;
if(cart[name]) cart[name].qty++;
else cart[name]={...menu[i],qty:1};
updateCart();
}

function changeQty(name,delta){
cart[name].qty+=delta;
if(cart[name].qty<=0) delete cart[name];
updateCart();
}

function updateCart(){
let c=document.getElementById('cartItems');
let total=0;
c.innerHTML='';
Object.values(cart).forEach(item=>{
total+=item.price*item.qty;
c.innerHTML+=`<div>
<span>${item.name} (₹${item.price})</span>
<div>
<button class='qty-btn' onclick="changeQty('${item.name}',-1)">-</button>
<b>${item.qty}</b>
<button class='qty-btn' onclick="changeQty('${item.name}',1)">+</button>
</div>
</div>`;
});
document.getElementById('total').innerText='Total: ₹'+total;
}

function showPayment(){
if(Object.keys(cart).length===0){alert('Cart empty');return;}
document.getElementById('payment').style.display='block';
}

function completePayment(){
alert('Payment Successful');
cart={};updateCart();
document.getElementById('payment').style.display='none';
}

function codOrder(){
alert('Order Placed');
cart={};updateCart();
document.getElementById('payment').style.display='none';
}

loadMenu();
</script>

</body>
</html>
